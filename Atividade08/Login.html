<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Atividade08/CSS/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Delius&family=Pacifico&display=swap" rel="stylesheet">
    <title>Login</title>
</head>
<body>
  <div class="form-card">
    <h2>Login</h2>
    <form action="/lab08/login" method="POST">
      <label>Usuário:</label>
      <input type="text" name="usuario" required>
      <label>Senha:</label>
      <input type="password" name="senha" required>
      <button type="submit">Entrar</button>
    </form>
    <div class="extra-link">
      Não tem conta? <a href="/lab08/Cadastro">Cadastre-se</a>
    </div>
  </div>
</body>
</html>
