<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">,
    <link rel="stylesheet" href="/Atividade08/CSS/Cadastro.css">
    <link href="https://fonts.googleapis.com/css2?family=Delius&family=Pacifico&display=swap" rel="stylesheet">

    <title>Cadastro</title>

</head>
<body>
  <div class="form-card">
    <h2>Cadastro</h2>
    <form action="/lab08/cadastra" method="POST">
      <label>Nome completo:</label>
      <input type="text" name="nome" required>
      <label>Usuário:</label>
      <input type="text" name="usuario" required>
      <label>Senha:</label>
      <input type="password" name="senha" required>
      <button type="submit">Cadastrar</button>
    </form>
    <div class="extra-link">
      Já tem conta? <a href="/lab08/Login">Faça login</a>
    </div>
  </div>
</body>
</html>
